kind = "mobile"
previewPath = "/"
title = "SmartHomework AI"
version = "1.0.0"
id = "artifacts/smart-homework"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19861

[services.development]
run = "pnpm --filter @workspace/smart-homework run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smart-homework", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/smart-homework", "run", "serve" ]

[services.env]
PORT = "19861"
BASE_PATH = "/"
